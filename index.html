<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="#" class="navbar-brand">
            <div class="brand-logo"></div>
            <span>Finance Tracker</span>
        </a>
        <div class="navbar-menu">
            <div class="dropdown export-dropdown">
                <button type="button" class="navbar-item" id="export-toggle" aria-expanded="false" aria-controls="export-dropdown">
                    📁 Import / Export
                </button>
                <div class="dropdown-content export-dropdown-content" id="export-dropdown">
                    <div class="dropdown-header">Import Data</div>
                    <div class="export-option">
                        <label for="import-file">Choose File</label>
                        <input type="file" id="import-file" accept=".json,.csv" class="export-select">
                    </div>
                    <div class="export-option">
                        <label for="import-format">Format</label>
                        <select id="import-format" class="export-select">
                            <option value="json">JSON</option>
                            <option value="csv-comma">CSV (comma)</option>
                            <option value="csv-semicolon">CSV (semicolon)</option>
                        </select>
                    </div>
                    <button id="import-btn" class="btn btn-primary export-btn">
                        Import
                    </button>
                    <hr style="margin: 1rem 0; border-color: var(--border-color);">
                    <div class="dropdown-header">Export Data</div>
                    <div class="export-option">
                        <label for="export-date-range">Date Range</label>
                        <select id="export-date-range" class="export-select">
                            <option value="all">All Time</option>
                            <option value="30days">Last 30 Days</option>
                            <option value="6months">Last 6 Months</option>
                            <option value="1year">Last 1 Year</option>
                        </select>
                    </div>
                    <div class="export-option">
                        <label for="export-format">Format</label>
                        <select id="export-format" class="export-select">
                            <option value="json">JSON</option>
                            <option value="csv-comma">CSV (comma)</option>
                            <option value="csv-semicolon">CSV (semicolon)</option>
                        </select>
                    </div>
                    <button id="export-btn" class="btn btn-primary export-btn">
                        Download Export
                    </button>
                </div>
            </div>
            <div class="dropdown">
                <button type="button" class="navbar-item" id="theme-toggle" aria-expanded="false" aria-controls="theme-dropdown">
                    🎨 Theme Selector
                </button>
                <div class="dropdown-content" id="theme-dropdown">
                    <div class="dropdown-header">Color Schemes</div>
                    <div id="theme-options"></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="header">
            <h1>Finance Tracker</h1>
            <div class="balance-summary">
                <div class="balance-item">
                    <span class="label">Total Income:</span>
                    <span class="value income" id="total-income">$0.00</span>
                </div>
                <div class="balance-item">
                    <span class="label">Total Expenses:</span>
                    <span class="value expense" id="total-expenses">$0.00</span>
                </div>
                <div class="balance-item balance-total">
                    <span class="label">Balance:</span>
                    <span class="value" id="balance">$0.00</span>
                </div>
            </div>
        </header>

        <main class="main-content" id="main-content">
            <section class="add-transaction">
                <h2>Add Transaction</h2>
                <form id="transaction-form" class="transaction-form">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" name="description" required maxlength="100">
                        <span class="error-message" id="description-error"></span>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" name="amount" step="0.01" min="0.01" required>
                            <span class="error-message" id="amount-error"></span>
                        </div>
                        
                        <div class="form-group">
                            <label for="type">Type</label>
                            <select id="type" name="type" required>
                                <option value="">Select type</option>
                                <option value="Income">Income</option>
                                <option value="Expense">Expense</option>
                            </select>
                            <span class="error-message" id="type-error"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">Category</label>
                            <input type="text" id="category" name="category" required maxlength="50">
                            <span class="error-message" id="category-error"></span>
                        </div>
                        
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" name="date" required>
                            <span class="error-message" id="date-error"></span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Add Transaction</button>
                        <button type="button" id="clear-all-btn" class="btn btn-secondary">Clear All</button>
                    </div>
                </form>
            </section>

            <section class="transactions-section">
                <h2>Transactions</h2>
                <div class="transaction-toolbar">
                    <div class="toolbar-group">
                        <label for="sort-by">Sort:</label>
                        <select id="sort-by">
                            <option value="date">Date</option>
                            <option value="amount">Amount</option>
                            <option value="description">Description</option>
                            <option value="category">Category</option>
                            <option value="type">Type</option>
                        </select>
                        <button id="sort-order-btn" class="btn btn-sort" title="Toggle sort order">
                            ↓ Descending
                        </button>
                    </div>
                    <div class="toolbar-group">
                        <label for="filter-type">Type:</label>
                        <select id="filter-type">
                            <option value="all">All</option>
                            <option value="Income">Income</option>
                            <option value="Expense">Expense</option>
                        </select>
                        <label for="filter-date-range">Range:</label>
                        <select id="filter-date-range">
                            <option value="all">All Time</option>
                            <option value="30days">Last 30 Days</option>
                            <option value="6months">Last 6 Months</option>
                            <option value="1year">Last 1 Year</option>
                        </select>
                    </div>
                    <div class="toolbar-group">
                        <label for="search-query">Search:</label>
                        <input type="search" id="search-query" class="search-input" placeholder="Description or category">
                    </div>
                </div>
                
                <div class="transactions-list" id="transactions-list">
                    <!-- Transactions will be rendered here -->
                </div>
            </section>

            <section class="chart-section">
                <h2>Expenses by Category</h2>
                <div class="chart-wrapper">
                    <canvas id="expenseChart" aria-label="Expenses by category chart"></canvas>
                    <p class="chart-empty" id="chart-empty">No expense data yet.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Panel -->
    <div class="edit-panel-overlay" id="edit-panel-overlay">
        <div class="edit-panel" id="edit-panel">
            <div class="edit-panel-header">
                <h3>Edit Transaction</h3>
                <button class="close-btn" id="close-edit-panel">x</button>
            </div>
            <form id="edit-transaction-form" class="transaction-form">
                <div class="form-group">
                    <label for="edit-description">Description</label>
                    <input type="text" id="edit-description" name="description" required maxlength="100">
                    <span class="error-message" id="edit-description-error"></span>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-amount">Amount</label>
                        <input type="number" id="edit-amount" name="amount" step="0.01" min="0.01" required>
                        <span class="error-message" id="edit-amount-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="edit-type">Type</label>
                        <select id="edit-type" name="type" required>
                            <option value="">Select type</option>
                            <option value="Income">Income</option>
                            <option value="Expense">Expense</option>
                        </select>
                        <span class="error-message" id="edit-type-error"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-category">Category</label>
                        <input type="text" id="edit-category" name="category" required maxlength="50">
                        <span class="error-message" id="edit-category-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="edit-date">Date</label>
                        <input type="date" id="edit-date" name="date" required>
                        <span class="error-message" id="edit-date-error"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Transaction</button>
                    <button type="button" id="cancel-edit-btn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <div id="message-area" class="message-area" role="status" aria-live="polite"></div>
</body>
</html>
